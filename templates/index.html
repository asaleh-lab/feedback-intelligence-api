<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Analysis</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <main class="container">
        <h1>Sentiment Analysis</h1>
        <p class="subtitle">Paste customer feedback and submit to see the result.</p>

        <form method="post">
            <label for="textToAnalyze">Feedback</label>
            <textarea
                id="textToAnalyze"
                name="textToAnalyze"
                rows="5"
                placeholder="Example: The product works great, but shipping was slow."
            >{{ text }}</textarea>

            <button type="submit">Analyze</button>
        </form>

        {% if result %}
        <section class="result">
            <p class="result-heading">Result</p>
            <p class="sentiment sentiment-{{ result.sentiment.lower() }}">{{ result.sentiment }}</p>
            <p class="confidence">{{ result.confidence }}% confidence</p>
        </section>
        {% endif %}

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}
    </main>
</body>
</html>
